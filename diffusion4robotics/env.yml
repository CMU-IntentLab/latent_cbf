name: data4robotics
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
    - python ==3.9
    - pytorch=2.0.1=py3.9_cuda11.8_cudnn8.7.0_0
    - torchvision
    - pytorch-cuda=11.8
    - cmake=3.22.1=h1fce559_0
    - numpy
    - pandas
    - plotly
    - pip
    - pytest==7.3.1
    - scipy
    - tqdm
    - patchelf
    - pip:
        - transforms3d
        - opencv-python
        - pyyaml
        - wandb==0.13.4
        - huggingface-hub
        - cloudpickle==2.0.0
        - imageio==2.22.1
        - imageio-ffmpeg==0.4.7
        - diffusers==0.25.0
        - h5py
        - requests
