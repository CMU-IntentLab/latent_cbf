defaults:
  - agent: diffusion_unet
  - task: dubins
  - trainer: bc_cos_sched
  - _self_


hydra:
  run:
    dir: /data/dubins/test/${exp_name}/${hydra:runtime.choices.task}_${hydra:runtime.choices.agent/features} #_${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ${base:}/../bc_finetune/${exp_name}/${now:%Y-%m-%d_%H-%M-%S}
    subdir: run${hydra:job.num}_${hydra:runtime.choices.task}_${hydra:runtime.choices.agent/features}

rt: ${hydra:runtime.choices.agent/features}

exp_name: diffusion_test2
checkpoint_path: ${exp_name}_latest.ckpt
batch_size: 100
num_workers: 10
lr: 0.0001
max_iterations: 20000
eval_freq: 500
save_freq: 500
schedule_freq: 1
devices: 1
seed: 292285

buffer_path: /data/dubins/buffers/buffer.pkl
ac_chunk: 16
img_chunk: 1  # number of image timesteps to use (including current one)
train_transform: preproc #medium

wandb:
  name: diffusion_dubins #null
  project: data_proj_finetune
  group: ${exp_name}
  sweep_name_prefix: eval
  debug: False
